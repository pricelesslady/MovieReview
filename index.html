<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineVerse</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <header class="navbar">
      <h1 class="logo">CineVerse 🎬</h1>
      <input type="text" placeholder="Search movies..." class="search-bar" />
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
      <h2>Discover. Vote. Share.</h2>
      <p>
        Explore movies, vote your favorite scenes, and share lessons with the
        world.
      </p>
    </section>

    <!-- MOVIES GRID (DYNAMIC) -->
    <section class="movies-section">
      <h2>Trending Movies</h2>
      <div class="movies-grid" id="moviesGrid">
        <!-- Movies will be inserted here by JavaScript -->
      </div>
    </section>

    <!-- MOVIE DETAILS (DYNAMIC) -->
    <section class="details-section" id="detailsSection">
      <h2>Select a movie to see details</h2>
    </section>

   
    <!-- FOOTER -->
    <footer>
      <p>© 2026 CineVerse | Built with creativity 🎬</p>
    </footer>

    <!-- JAVASCRIPT -->
    <script src="script.js"></script>
  </body>
</html>
